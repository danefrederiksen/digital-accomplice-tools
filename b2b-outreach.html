<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prospecting Tool #1 — B2B 1st Connections DM Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Poppins', sans-serif; background: #f5f5f5; color: #1a1a1a; }

/* Header */
.header { background: #000; color: #fff; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 20px; font-weight: 700; }
.header h1 span { color: #F8901E; }
.header-right { font-size: 13px; color: #999; }

/* Tabs */
.tabs { background: #fff; border-bottom: 2px solid #eee; padding: 0 24px; display: flex; gap: 0; }
.tab { padding: 12px 20px; cursor: pointer; font-weight: 500; font-size: 14px; color: #666; border-bottom: 3px solid transparent; transition: all 0.2s; }
.tab:hover { color: #F8901E; }
.tab.active { color: #F8901E; border-bottom-color: #F8901E; }

/* Content */
.content { max-width: 1100px; margin: 0 auto; padding: 24px; }

/* Alert banner */
.alert-banner { background: linear-gradient(135deg, #F8901E, #e07a10); color: #fff; border-radius: 10px; padding: 16px 20px; margin-bottom: 24px; font-size: 14px; line-height: 1.5; }
.alert-banner strong { font-size: 16px; display: block; margin-bottom: 4px; }
.alert-stat { display: inline-block; background: rgba(255,255,255,0.2); border-radius: 6px; padding: 4px 10px; margin: 4px 4px 4px 0; font-weight: 600; font-size: 13px; }

/* Section headers */
.section-header { font-size: 16px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.section-header .count { background: #F8901E; color: #fff; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
.section { margin-bottom: 32px; }

/* Cards */
.card { background: #fff; border-radius: 10px; padding: 16px; margin-bottom: 10px; border: 1px solid #e5e5e5; transition: box-shadow 0.2s; }
.card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.card-name { font-weight: 700; font-size: 15px; }
.card-company { font-size: 13px; color: #666; }
.card-title { font-size: 12px; color: #999; margin-top: 2px; }
.card-meta { display: flex; gap: 12px; font-size: 12px; color: #888; margin-top: 6px; flex-wrap: wrap; }
.card-meta a { color: #F8901E; text-decoration: none; font-weight: 500; }
.card-meta a:hover { text-decoration: underline; }

/* Status badge */
.card-delete { position: absolute; top: 8px; right: 8px; background: none; border: none; color: #ccc; font-size: 16px; cursor: pointer; padding: 2px 6px; border-radius: 4px; line-height: 1; }
.card-delete:hover { color: #c62828; background: #fee; }
.card { position: relative; }

/* Search bar */
.search-bar { width: 100%; padding: 12px 16px; font-size: 15px; font-family: 'Poppins', sans-serif; border: 2px solid #ddd; border-radius: 10px; outline: none; transition: border-color 0.15s; background: #fff; margin-bottom: 16px; }
.search-bar:focus { border-color: #F8901E; }
.search-bar::placeholder { color: #bbb; }
.search-count { font-size: 12px; color: #999; margin-bottom: 12px; }

.status { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.status-not_started { background: #e8e8e8; color: #666; }
.status-dm_sent { background: #fff3e0; color: #e65100; }
.status-follow_up_1 { background: #e3f2fd; color: #1565c0; }
.status-follow_up_2 { background: #fce4ec; color: #c62828; }
.status-replied { background: #e8f5e9; color: #2e7d32; }
.status-cold { background: #f5f5f5; color: #999; }

/* Buttons */
.btn { padding: 7px 14px; border-radius: 6px; font-family: 'Poppins', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
.btn-primary { background: #F8901E; color: #fff; }
.btn-primary:hover { background: #e07a10; }
.btn-secondary { background: #eee; color: #333; }
.btn-secondary:hover { background: #ddd; }
.btn-danger { background: #fee; color: #c62828; }
.btn-danger:hover { background: #fdd; }
.btn-success { background: #e8f5e9; color: #2e7d32; }
.btn-success:hover { background: #c8e6c9; }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.btn-group { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }

/* Import */
.import-zone { border: 2px dashed #ccc; border-radius: 10px; padding: 40px; text-align: center; background: #fff; cursor: pointer; transition: border-color 0.2s; margin-bottom: 20px; }
.import-zone:hover { border-color: #F8901E; }
.import-zone input { display: none; }
.import-zone p { color: #888; font-size: 14px; margin-top: 8px; }
.import-zone .icon { font-size: 36px; margin-bottom: 8px; }

/* Filter results table */
.filter-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; border: 1px solid #e5e5e5; }
.filter-table th { background: #fafafa; text-align: left; padding: 10px 12px; font-size: 12px; font-weight: 600; color: #666; border-bottom: 2px solid #eee; }
.filter-table td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid #f0f0f0; }
.filter-table tr:hover td { background: #fafafa; }
.filter-table input[type="checkbox"] { width: 16px; height: 16px; accent-color: #F8901E; cursor: pointer; }

.selected-count { margin: 12px 0; font-size: 14px; font-weight: 500; }
.selected-count span { color: #F8901E; font-weight: 700; }

/* Reply field */
.reply-area { margin-top: 8px; }
.reply-area textarea { width: 100%; border: 1px solid #ddd; border-radius: 6px; padding: 8px; font-family: 'Poppins', sans-serif; font-size: 13px; resize: vertical; min-height: 60px; }
.reply-area label { font-size: 12px; font-weight: 600; color: #666; display: block; margin-bottom: 4px; }

/* Draft reply */
.draft-reply-area { margin-top: 10px; background: #faf6ff; border: 1px solid #e0d0ff; border-radius: 8px; padding: 12px; }
.draft-reply-area label { font-size: 12px; font-weight: 700; color: #6b21a8; display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.draft-reply-area textarea { width: 100%; border: 1px solid #d4c4f0; border-radius: 6px; padding: 8px; font-family: 'Poppins', sans-serif; font-size: 13px; resize: vertical; min-height: 80px; background: #fff; line-height: 1.5; }
.draft-reply-area textarea:focus { outline: none; border-color: #6b21a8; box-shadow: 0 0 0 2px rgba(107,33,168,0.1); }
.draft-reply-header { display: flex; justify-content: space-between; align-items: center; }
.btn-copy-draft { background: #6b21a8; color: #fff; padding: 5px 12px; border-radius: 5px; font-size: 11px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; font-family: 'Poppins', sans-serif; }
.btn-copy-draft:hover { background: #581c87; }
.btn-copy-draft.copied { background: #2e7d32; }

/* Next step field */
.next-step-field { margin-top: 6px; }
.next-step-field input { width: 100%; border: 1px solid #ddd; border-radius: 6px; padding: 7px 10px; font-family: 'Poppins', sans-serif; font-size: 13px; }

/* Empty state */
.empty { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }
.empty .icon { font-size: 32px; margin-bottom: 8px; }

/* Sequence timeline */
.timeline { display: flex; gap: 0; margin-top: 8px; font-size: 11px; }
.timeline-step { flex: 1; text-align: center; padding: 6px 4px; background: #f5f5f5; border-right: 1px solid #e5e5e5; color: #999; }
.timeline-step:first-child { border-radius: 6px 0 0 6px; }
.timeline-step:last-child { border-radius: 0 6px 6px 0; border-right: none; }
.timeline-step.done { background: #e8f5e9; color: #2e7d32; }
.timeline-step.current { background: #fff3e0; color: #e65100; font-weight: 600; }
.timeline-step.upcoming { background: #f5f5f5; color: #bbb; }

/* Copy message button */
.btn-copy { background: #f0e6ff; color: #6b21a8; }
.btn-copy:hover { background: #e0d0ff; }
.btn-copy.copied { background: #e8f5e9; color: #2e7d32; }
.msg-preview { background: #fafafa; border: 1px solid #eee; border-radius: 6px; padding: 10px 12px; margin-top: 8px; font-size: 12px; color: #555; line-height: 1.5; white-space: pre-wrap; display: none; }
.msg-preview.show { display: block; }

/* Manual add form */
.add-form { background: #fff; border-radius: 10px; padding: 20px; border: 1px solid #e5e5e5; margin-bottom: 20px; }
.add-form h3 { font-size: 14px; margin-bottom: 12px; }
.form-row { display: flex; gap: 10px; margin-bottom: 10px; }
.form-row input { flex: 1; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-family: 'Poppins', sans-serif; font-size: 13px; }

/* Overdue indicator */
.overdue { color: #c62828; font-weight: 600; font-size: 11px; }

/* Due date info */
.due-info { font-size: 12px; color: #666; margin-top: 4px; }
.due-info strong { color: #F8901E; }

/* LinkedIn URL in card */
.linkedin-link { color: #F8901E; text-decoration: none; font-size: 12px; font-weight: 500; }
.linkedin-link:hover { text-decoration: underline; }

/* Daily progress */
.daily-progress { background: #fff; border-radius: 10px; padding: 14px 20px; border: 1px solid #e5e5e5; margin-bottom: 20px; }
.daily-progress h3 { font-size: 13px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.daily-progress .lbl { color: #999; font-weight: 400; font-size: 11px; }
.progress-row { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
.progress-row:last-child { margin-bottom: 0; }
.progress-label { font-size: 12px; font-weight: 600; color: #555; min-width: 120px; }
.progress-track { flex: 1; height: 20px; background: #f0f0f0; border-radius: 10px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 10px; transition: width 0.3s; }
.progress-fill.orange { background: linear-gradient(135deg, #F8901E, #e07a10); }
.progress-fill.green { background: linear-gradient(135deg, #4caf50, #388e3c); }
.progress-nums { font-size: 13px; font-weight: 700; min-width: 50px; text-align: right; }
.progress-nums.done { color: #2e7d32; }

/* Template editor modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: #fff; border-radius: 12px; padding: 24px; max-width: 700px; width: 95%; max-height: 85vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
.modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
.modal label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: #333; }
.modal textarea { width: 100%; min-height: 100px; padding: 10px; font-family: 'Poppins', sans-serif; font-size: 13px; border: 2px solid #ddd; border-radius: 8px; resize: vertical; margin-bottom: 16px; outline: none; transition: border-color 0.15s; }
.modal textarea:focus { border-color: #F8901E; }
.modal .hint { font-size: 11px; color: #999; margin: -12px 0 16px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
.btn-templates { background: transparent; border: 1px solid #F8901E; color: #F8901E; padding: 6px 14px; border-radius: 6px; font-family: 'Poppins', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.btn-templates:hover { background: #F8901E; color: #fff; }

@media (max-width: 700px) {
  .content { padding: 16px; }
  .form-row { flex-direction: column; }
  .card-top { flex-direction: column; gap: 6px; }
}
</style>
</head>
<body>
<div class="header">
  <h1><span>DA</span> Prospecting Tool #1 — B2B 1st Connections</h1>
  <div class="header-right"><button class="btn-templates" onclick="openTemplateEditor()">Edit Templates</button> <span id="prospect-count" style="margin-left:8px;"></span></div>
</div>
<div class="tabs" id="tabs"></div>
<div class="content" id="content"></div>
<div class="modal-overlay" id="template-modal" onclick="if(event.target===this)closeTemplateEditor()">
  <div class="modal" id="template-modal-content"></div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
const TITLE_KEYWORDS = ['founder','ceo','cmo','vp marketing','head of marketing','creative director','chief marketing','marketing director','co-founder','owner','president','managing director'];

let state = {
  prospects: [],
  importedContacts: [],
  activeTab: 'dashboard',
  searchQuery: ''
};

// ============================================================
// API HELPERS
// ============================================================
async function apiGet(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`GET ${url} failed: ${res.status}`);
  return res.json();
}

async function apiPost(url, body) {
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(`POST ${url} failed: ${res.status}`);
  return res.json();
}

async function apiPut(url, body) {
  const res = await fetch(url, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(`PUT ${url} failed: ${res.status}`);
  return res.json();
}

async function apiDelete(url) {
  const res = await fetch(url, { method: 'DELETE' });
  if (!res.ok) throw new Error(`DELETE ${url} failed: ${res.status}`);
  return res.json();
}

async function loadFromServer() {
  try {
    const data = await apiGet('/api/prospects');
    state.prospects = data.prospects || [];

    // One-time migration: if server is empty but localStorage has data
    if (state.prospects.length === 0) {
      try {
        const local = JSON.parse(localStorage.getItem('da-b2b-outreach')) || [];
        if (local.length > 0 && confirm(`Found ${local.length} prospects in browser storage. Migrate to server?`)) {
          await apiPost('/api/prospects/migrate', { prospects: local });
          const refreshed = await apiGet('/api/prospects');
          state.prospects = refreshed.prospects || [];
          localStorage.removeItem('da-b2b-outreach');
          alert('Migration complete! Your data is now saved on the server.');
        }
      } catch (e) { /* localStorage empty or parse error */ }
    }
  } catch (err) {
    console.error('Failed to load from server:', err);
    // Fallback to localStorage if server is down
    try { state.prospects = JSON.parse(localStorage.getItem('da-b2b-outreach')) || []; }
    catch { state.prospects = []; }
  }
  render();
}

// ============================================================
// DATE HELPERS
// ============================================================
function today() {
  const d = new Date();
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}

function addDays(dateStr, days) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + days);
  return d.toISOString().split('T')[0];
}

function daysBetween(dateStr1, dateStr2) {
  const d1 = new Date(dateStr1);
  const d2 = new Date(dateStr2);
  return Math.floor((d2 - d1) / (1000 * 60 * 60 * 24));
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function todayStr() {
  return today().toISOString().split('T')[0];
}

// ============================================================
// MESSAGE TEMPLATES (editable via localStorage)
// ============================================================
const TOOL_KEY = 'da_templates_tool1';
const DEFAULT_TEMPLATES = {
  dm: `Hello {name}, I'm producing a short video series on how B2B marketing leaders are adapting to the challenges as AI changes the game.\n\nTakes just 15 min, no prep and I'll post on LinkedIn same day and tag you.\n\nhttps://www.digitalaccomplice.com/video-series\n\nInterested?\n\nDane`,
  follow_up_1: `Hey {name} — just floating this back up. Would love to feature you in the series. 15 min, zero prep. Worth a quick chat?`,
  follow_up_2: `{name} — last one from me on this. If the timing's off no worries at all. But if you're open to it, I'd love to make it happen. Either way, keep killing it.\n\nDane`
};

const TEMPLATE_LABELS = {
  dm: 'Initial DM',
  follow_up_1: 'Follow-Up #1',
  follow_up_2: 'Follow-Up #2'
};

function loadTemplates() {
  try {
    const saved = localStorage.getItem(TOOL_KEY);
    if (saved) return { ...DEFAULT_TEMPLATES, ...JSON.parse(saved) };
  } catch {}
  return { ...DEFAULT_TEMPLATES };
}

function saveTemplates(templates) {
  localStorage.setItem(TOOL_KEY, JSON.stringify(templates));
}

function openTemplateEditor() {
  const templates = loadTemplates();
  const modal = document.getElementById('template-modal-content');
  let html = `<h2>Edit Message Templates</h2><p class="hint">Use {name} for first name, {company} for company name.</p>`;
  for (const [key, label] of Object.entries(TEMPLATE_LABELS)) {
    html += `<label>${label}</label>`;
    html += `<textarea id="tpl-${key}">${esc(templates[key] || DEFAULT_TEMPLATES[key])}</textarea>`;
  }
  html += `<div class="modal-actions">
    <button class="btn btn-secondary" onclick="resetTemplates()">Reset to Defaults</button>
    <button class="btn btn-secondary" onclick="closeTemplateEditor()">Cancel</button>
    <button class="btn btn-primary" onclick="saveTemplateEditor()">Save</button>
  </div>`;
  modal.innerHTML = html;
  document.getElementById('template-modal').classList.add('show');
}

function closeTemplateEditor() {
  document.getElementById('template-modal').classList.remove('show');
}

function saveTemplateEditor() {
  const templates = {};
  for (const key of Object.keys(TEMPLATE_LABELS)) {
    templates[key] = document.getElementById('tpl-' + key).value;
  }
  saveTemplates(templates);
  closeTemplateEditor();
}

function resetTemplates() {
  if (!confirm('Reset all templates to defaults?')) return;
  localStorage.removeItem(TOOL_KEY);
  openTemplateEditor();
}

function firstName(fullName) {
  return (fullName || '').split(' ')[0];
}

function getMessage(prospect, step) {
  const templates = loadTemplates();
  const template = templates[step] || '';
  return template
    .replace(/\{name\}/g, firstName(prospect.name))
    .replace(/\{company\}/g, prospect.company || 'your company');
}

async function copyMessage(prospectId, step) {
  const p = state.prospects.find(x => x.id === prospectId);
  if (!p) return;
  const msg = getMessage(p, step);
  try {
    await navigator.clipboard.writeText(msg);
    const btn = document.getElementById('copy-btn-' + prospectId);
    if (btn) {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy Message'; btn.classList.remove('copied'); }, 2000);
    }
  } catch (err) { alert('Copy failed — check browser permissions'); }
}

function togglePreview(prospectId, step) {
  const el = document.getElementById('msg-preview-' + prospectId);
  if (!el) return;
  if (el.classList.contains('show')) {
    el.classList.remove('show');
  } else {
    const p = state.prospects.find(x => x.id === prospectId);
    if (p) el.textContent = getMessage(p, step);
    el.classList.add('show');
  }
}

// ============================================================
// PROSPECT ACTIONS (async — saved to server)
// ============================================================
async function markDmSent(id) {
  const t = todayStr();
  try {
    const updated = await apiPut('/api/prospects/' + id, {
      status: 'dm_sent',
      dmSentDate: t,
      lastActionDate: t,
      followUp1Due: addDays(t, 3),
      followUp2Due: addDays(t, 7)
    });
    const idx = state.prospects.findIndex(x => x.id === id);
    if (idx !== -1) state.prospects[idx] = updated;
    render();
  } catch (err) { alert('Failed to save: ' + err.message); }
}

async function markFollowUp1(id) {
  try {
    const updated = await apiPut('/api/prospects/' + id, {
      status: 'follow_up_1',
      lastActionDate: todayStr()
    });
    const idx = state.prospects.findIndex(x => x.id === id);
    if (idx !== -1) state.prospects[idx] = updated;
    render();
  } catch (err) { alert('Failed to save: ' + err.message); }
}

async function markFollowUp2(id) {
  try {
    const updated = await apiPut('/api/prospects/' + id, {
      status: 'follow_up_2',
      lastActionDate: todayStr()
    });
    const idx = state.prospects.findIndex(x => x.id === id);
    if (idx !== -1) state.prospects[idx] = updated;
    render();
  } catch (err) { alert('Failed to save: ' + err.message); }
}

async function markReplied(id) {
  try {
    const updated = await apiPut('/api/prospects/' + id, {
      status: 'replied',
      lastActionDate: todayStr()
    });
    const idx = state.prospects.findIndex(x => x.id === id);
    if (idx !== -1) state.prospects[idx] = updated;
    render();
  } catch (err) { alert('Failed to save: ' + err.message); }
}

async function markCold(id) {
  try {
    const updated = await apiPut('/api/prospects/' + id, {
      status: 'cold',
      lastActionDate: todayStr()
    });
    const idx = state.prospects.findIndex(x => x.id === id);
    if (idx !== -1) state.prospects[idx] = updated;
    render();
  } catch (err) { alert('Failed to save: ' + err.message); }
}

const _debounce = {};
function updateReply(id, text) {
  clearTimeout(_debounce['reply_' + id]);
  _debounce['reply_' + id] = setTimeout(async () => {
    try {
      await apiPut('/api/prospects/' + id, { reply: text });
      const p = state.prospects.find(x => x.id === id);
      if (p) p.reply = text;
    } catch (err) { console.error('Failed to save reply:', err); }
  }, 500);
}

function updateNextStep(id, text) {
  clearTimeout(_debounce['next_' + id]);
  _debounce['next_' + id] = setTimeout(async () => {
    try {
      await apiPut('/api/prospects/' + id, { nextStep: text });
      const p = state.prospects.find(x => x.id === id);
      if (p) p.nextStep = text;
    } catch (err) { console.error('Failed to save next step:', err); }
  }, 500);
}

function getDraftReply(prospect) {
  if (prospect.draftReply) return prospect.draftReply;
  const name = firstName(prospect.name);
  const company = prospect.company ? ` at ${prospect.company}` : '';
  return `Hey ${name} — thanks for getting back to me! Really glad this resonated.\n\nWould love to set up a quick call to talk through how video could work for${company ? company : ' your team'}. What does your calendar look like this week or next?\n\nDane`;
}

async function copyDraftReply(prospectId) {
  const p = state.prospects.find(x => x.id === prospectId);
  if (!p) return;
  const el = document.getElementById('draft-reply-' + prospectId);
  const msg = el ? el.value : getDraftReply(p);
  try {
    await navigator.clipboard.writeText(msg);
    const btn = document.getElementById('copy-draft-btn-' + prospectId);
    if (btn) {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy Draft'; btn.classList.remove('copied'); }, 2000);
    }
  } catch (err) { alert('Copy failed — check browser permissions'); }
}

function updateDraftReply(id, text) {
  clearTimeout(_debounce['draft_' + id]);
  _debounce['draft_' + id] = setTimeout(async () => {
    try {
      await apiPut('/api/prospects/' + id, { draftReply: text });
      const p = state.prospects.find(x => x.id === id);
      if (p) p.draftReply = text;
    } catch (err) { console.error('Failed to save draft reply:', err); }
  }, 500);
}

async function removeProspect(id) {
  if (!confirm('Remove this prospect?')) return;
  try {
    await apiDelete('/api/prospects/' + id);
    state.prospects = state.prospects.filter(x => x.id !== id);
    render();
  } catch (err) { alert('Failed to remove: ' + err.message); }
}

async function resetProspect(id) {
  const p = state.prospects.find(x => x.id === id);
  if (!p || !confirm('Reset this prospect to Not Started?')) return;
  try {
    const updated = await apiPut('/api/prospects/' + id, {

      dmSentDate: null,
      followUp1Due: null,
      followUp2Due: null,
      lastActionDate: null,
      reply: '',

    });

}

// ============================================================
// CSV IMPORT
// ============================================================
function handleCSV(file) {
  Papa.parse(file, {
    header: false,
    skipEmptyLines: true,
    complete: function(results) {
      const raw = results.data;
      if (!raw.length) { alert('CSV appears empty — no rows found.'); return; }

      // Detect format: check if first row looks like LinkedIn headers
      const first = raw[0].map(c => (c || '').toLowerCase().trim());
      const isLinkedIn = first.includes('first name') || first.includes('last name') || first.includes('position');

      let rows;
      if (isLinkedIn) {
        // LinkedIn CSV with headers — use first row as keys, remaining rows as data
        const headers = raw[0].map(c => (c || '').trim());
        const dataRows = raw.slice(1);
        rows = dataRows.map(cols => {
          const obj = {};
          headers.forEach((h, i) => { obj[h] = (cols[i] || '').trim(); });
          const firstName = obj['First Name'] || obj['first_name'] || '';
          const lastName = obj['Last Name'] || obj['last_name'] || '';
          const company = obj['Company'] || obj['company'] || obj['Organization'] || '';
          const position = obj['Position'] || obj['position'] || obj['Title'] || obj['title'] || '';
          const url = obj['URL'] || obj['url'] || obj['LinkedIn URL'] || obj['Profile URL'] || '';
          return { firstName, lastName, company, position, url, selected: false };
        });
      } else {
        // No-header CSV
        rows = raw.map(cols => {
          const name = (cols[0] || '').trim();
          const companyOrHeadline = (cols[1] || '').trim();
          const title = (cols[2] || '').trim();
          let url = '';
          for (let i = 0; i < cols.length; i++) {
            if ((cols[i] || '').includes('linkedin.com/in/')) { url = cols[i].trim(); break; }
          }
          let company = companyOrHeadline;
          if (companyOrHeadline.includes('|')) { company = ''; }
          return { firstName: name, lastName: '', company, position: title, url, selected: false };
        });
      }

      if (!rows.length) { alert('No contacts found in file.'); return; }
      finishImport(rows);
    },
    error: function(err) {
      alert('CSV parse error: ' + err.message);
    }
  });
}

function finishImport(rows) {
  // Filter by title keywords
  const filtered = rows.filter(r => {
    const pos = r.position.toLowerCase();
    return TITLE_KEYWORDS.some(kw => pos.includes(kw));
  });

  // If keyword filter removes everything, show all rows (user's CSV may already be pre-filtered)
  state.importedContacts = filtered.length > 0 ? filtered : rows;
  render();
}

async function activateSelected() {
  const selected = state.importedContacts.filter(c => c.selected);
  if (!selected.length) return;

  const prospects = selected.map(c => ({
    name: (c.firstName + ' ' + c.lastName).trim(),
    company: c.company,
    title: c.position,
    linkedinUrl: c.url
  }));

  try {
    const result = await apiPost('/api/prospects', { prospects });
    const data = await apiGet('/api/prospects');
    state.prospects = data.prospects || [];
    state.importedContacts = [];
    alert(result.added + ' prospect(s) added.' + (result.skipped ? ' ' + result.skipped + ' skipped (duplicates).' : ''));
    state.activeTab = 'dashboard';
    render();
  } catch (err) { alert('Failed to add prospects: ' + err.message); }
}

async function addManualProspect() {

  const company = document.getElementById('manual-company').value.trim();

  });
}

function getReplied() {
  return state.prospects.filter(p => p.status === 'replied');
}

function getWaiting() {
  const t = todayStr();
  return state.prospects.filter(p => {
    if (p.status === 'dm_sent' && p.followUp1Due && p.followUp1Due > t) return true;

// ============================================================
const DAILY_TARGETS = { newOutreach: 4, totalTouches: 10 };

function getDailyProgress() {
  const t = todayStr();
  const newSends = state.prospects.filter(p => p.dmSentDate === t).length;
  const followUps = state.prospects.filter(p => p.lastActionDate === t && (p.status === 'follow_up_1' || p.status === 'follow_up_2')).length;
  return { newSends, followUps, total: newSends + followUps };
}

function renderDailyProgress() {
  const { newSends, total } = getDailyProgress();
  const newPct = Math.min(100, Math.round((newSends / DAILY_TARGETS.newOutreach) * 100));
  const totalPct = Math.min(100, Math.round((total / DAILY_TARGETS.totalTouches) * 100));
  const newDone = newSends >= DAILY_TARGETS.newOutreach;
  const totalDone = total >= DAILY_TARGETS.totalTouches;
  return `<div class="daily-progress">
    <h3>Daily Target <span class="lbl">LinkedIn DMs</span></h3>
    <div class="progress-row">
      <span class="progress-label">New DMs</span>
      <div class="progress-track"><div class="progress-fill ${newDone ? 'green' : 'orange'}" style="width:${newPct}%"></div></div>
      <span class="progress-nums ${newDone ? 'done' : ''}">${newSends} / ${DAILY_TARGETS.newOutreach}</span>
    </div>
    <div class="progress-row">
      <span class="progress-label">Total touches</span>
      <div class="progress-track"><div class="progress-fill ${totalDone ? 'green' : 'orange'}" style="width:${totalPct}%"></div></div>
      <span class="progress-nums ${totalDone ? 'done' : ''}">${total} / ${DAILY_TARGETS.totalTouches}</span>
    </div>
  </div>`;
}

    if (p.status === 'dm_sent') {
      const daysOver = daysBetween(p.followUp1Due, t);
      const overdueLabel = daysOver > 0 ? `<span class="overdue">${daysOver} day${daysOver > 1 ? 's' : ''} overdue</span>` : '';
      extra = `<div class="due-info">First follow-up ${overdueLabel}</div><div class="msg-preview" id="msg-preview-${p.id}"></div>`;
      buttons = `
        <button class="btn btn-copy btn-sm" id="copy-btn-${p.id}" onclick="copyMessage('${p.id}','follow_up_1')">Copy Message</button>
        <button class="btn btn-secondary btn-sm" onclick="togglePreview('${p.id}','follow_up_1')">Preview</button>
        <button class="btn btn-primary btn-sm" onclick="markFollowUp1('${p.id}')">Mark Follow-Up Sent</button>
        <button class="btn btn-success btn-sm" onclick="markReplied('${p.id}')">Got Reply</button>

      `;
    } else if (p.status === 'follow_up_1') {
      const daysOver = daysBetween(p.followUp2Due, t);
      const overdueLabel = daysOver > 0 ? `<span class="overdue">${daysOver} day${daysOver > 1 ? 's' : ''} overdue</span>` : '';
      extra = `<div class="due-info">Final nudge ${overdueLabel}</div><div class="msg-preview" id="msg-preview-${p.id}"></div>`;

      buttons = `
        <button class="btn btn-danger btn-sm" onclick="markCold('${p.id}')">Mark Cold</button>
        <button class="btn btn-success btn-sm" onclick="markReplied('${p.id}')">Got Reply</button>

    }

        </div>
        <textarea id="draft-reply-${p.id}" placeholder="Your reply to send back..." onblur="updateDraftReply('${p.id}', this.value)">${esc(draft)}</textarea>
      </div>
      <div class="next-step-field">
        <label style="font-size:12px;font-weight:600;color:#666;display:block;margin-bottom:4px;">Next step:</label>
        <input placeholder="e.g. Schedule call for Tuesday" value="${esc(p.nextStep || '')}" onblur="updateNextStep('${p.id}', this.value)" />
      </div>
    `;
  }

  return `<div class="card">
    <div class="card-top">
      <div>
        <span class="card-name">${esc(p.name)}</span> <span class="card-company">@ ${esc(p.company)}</span>
        <div class="card-title">${esc(p.title)}</div>

    ${extra}

}

function renderTimeline(p) {
  const steps = [
    { label: 'DM', key: 'dm_sent' },
    { label: 'Follow-Up', key: 'follow_up_1' },
    { label: 'Final Nudge', key: 'follow_up_2' }
  ];
  const statusOrder = ['not_started', 'dm_sent', 'follow_up_1', 'follow_up_2'];
  const currentIdx = statusOrder.indexOf(p.status);

  if (p.status === 'not_started' || p.status === 'replied' || p.status === 'cold') return '';

  return `<div class="timeline">${steps.map((s, i) => {
    const stepIdx = i + 1;
    let cls = 'upcoming';
    if (stepIdx < currentIdx) cls = 'done';
    else if (stepIdx === currentIdx) cls = 'current';
    return `<div class="timeline-step ${cls}">${s.label}</div>`;
  }).join('')}</div>`;
}

function renderProspects() {
  if (state.prospects.length === 0) {
    return `<div class="empty"><div class="icon">&#x1F465;</div>No prospects yet. Import a CSV or add manually.</div>`;
  }

  let html = `<input type="text" class="search-bar" placeholder="Search by name, company, or title..." value="${esc(state.searchQuery)}" oninput="handleSearch(this.value)">`;
  html += `<div id="prospects-list">`;
  html += renderProspectsList();
  html += `</div>`;
  return html;
}

function renderProspectCard(p) {
  let html = '';
  {
    html += `<div class="card">
      <div class="card-top">
        <div>
          <span class="card-name">${esc(p.name)}</span> <span class="card-company">@ ${esc(p.company)}</span>
          <div class="card-title">${esc(p.title)}</div>
          <div class="card-meta">
            ${p.linkedinUrl ? `<a href="${esc(p.linkedinUrl)}" target="_blank" class="linkedin-link">LinkedIn Profile</a>` : ''}
            ${getActivityFeedUrl(p.linkedinUrl) ? `<a href="${getActivityFeedUrl(p.linkedinUrl)}" target="_blank" class="linkedin-link">Activity Feed</a>` : ''}
            ${p.dmSentDate ? `<span>DM: ${formatDate(p.dmSentDate)}</span>` : ''}
            ${p.lastActionDate ? `<span>Last action: ${formatDate(p.lastActionDate)}</span>` : ''}
          </div>
        </div>
        <span class="status status-${p.status}">${STATUS_LABELS[p.status]}</span>
      </div>
      ${renderTimeline(p)}
      ${p.reply ? `<div style="margin-top:8px;font-size:13px;"><strong>Reply:</strong> ${esc(p.reply)}</div>` : ''}
      ${p.nextStep ? `<div style="margin-top:4px;font-size:13px;"><strong>Next:</strong> ${esc(p.nextStep)}</div>` : ''}
      <div class="btn-group">
        ${p.status === 'not_started' ? `<button class="btn btn-primary btn-sm" onclick="markDmSent('${p.id}')">Mark DM Sent</button>` : ''}
        ${p.status === 'dm_sent' ? `<button class="btn btn-primary btn-sm" onclick="markFollowUp1('${p.id}')">Mark Follow-Up Sent</button>` : ''}
        ${p.status === 'follow_up_1' ? `<button class="btn btn-primary btn-sm" onclick="markFollowUp2('${p.id}')">Mark Final Nudge Sent</button>` : ''}
        ${p.status !== 'replied' && p.status !== 'cold' ? `<button class="btn btn-success btn-sm" onclick="markReplied('${p.id}')">Got Reply</button>` : ''}
        ${p.status !== 'cold' ? `<button class="btn btn-danger btn-sm" onclick="markCold('${p.id}')">Mark Cold</button>` : ''}
        <button class="btn btn-secondary btn-sm" onclick="resetProspect('${p.id}')">Reset</button>
        <button class="btn btn-secondary btn-sm" onclick="removeProspect('${p.id}')">Remove</button>
      </div>
    </div>`;
  }
  return html;
}

// ============================================================
// RENDER — ACTIVITY LOG
// ============================================================
async function loadActivityLog() {
  try {
    const data = await apiGet('/api/activity?limit=100');
    const el = document.getElementById('content');
    if (state.activeTab !== 'activity') return;

    if (!data.activity || data.activity.length === 0) {
      el.innerHTML = '<div class="empty"><div class="icon">&#x1F4CB;</div>No activity recorded yet. Actions will appear here as you use the tool.</div>';
      return;
    }

    let html = '<div class="section"><div class="section-header">Activity Log <span class="count">' + data.activity.length + '</span></div>';
    let lastDate = '';
    data.activity.forEach(a => {
      const dateStr = a.date ? a.date.split('T')[0] : '';
      const timeStr = a.date ? new Date(a.date).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }) : '';
      if (dateStr !== lastDate) {
        lastDate = dateStr;
        html += `<div style="font-size:13px;font-weight:700;color:#333;margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid #eee;">${formatDate(dateStr)}</div>`;
      }
      html += `<div class="card" style="padding:10px 16px;">
        <span style="font-size:12px;color:#888;min-width:70px;display:inline-block;">${timeStr}</span>
        <span style="font-size:13px;margin-left:8px;"><strong>${esc(a.action)}</strong>${a.prospectName ? ' — ' + esc(a.prospectName) : ''}</span>
      </div>`;
    });
    html += '</div>';
    el.innerHTML = html;
  } catch (err) {
    document.getElementById('content').innerHTML = '<div class="empty">Failed to load activity log.</div>';
  }
}

// ============================================================
// HELPERS
// ============================================================
function esc(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ============================================================
// INIT
// ============================================================
loadFromServer();
</script>
