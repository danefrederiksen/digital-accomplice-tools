<!DOCTYPE html>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #f5f5f5; color: #1a1a1a; }

/* Header */

/* Import */

/* Next step field */

/* Copy message button */

.btn-copy.copied { background: #e8f5e9; color: #2e7d32; }

/* Overdue indicator */

/* Due date info */

/* Connection warning */

/* LinkedIn URL in card */

/* Template editor modal */

.modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
.modal label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: #333; }
.modal textarea { width: 100%; min-height: 100px; padding: 10px; font-family: 'Inter', sans-serif; font-size: 13px; border: 2px solid #ddd; border-radius: 8px; resize: vertical; margin-bottom: 16px; outline: none; transition: border-color 0.15s; }

.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
.btn-templates { background: transparent; border: 1px solid #F8901E; color: #F8901E; padding: 6px 14px; border-radius: 6px; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }

/* A/B variant badge on prospect cards */
.ab-badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; margin-left: 6px; vertical-align: middle; }

/* Template editor: A/B step sections */
.tpl-step-section { margin-bottom: 20px; border: 1px solid #eee; border-radius: 8px; padding: 12px 16px; }
.tpl-step-header { font-size: 14px; font-weight: 700; color: #333; margin-bottom: 8px; }
.tpl-variant-tabs { display: flex; gap: 0; margin-bottom: 8px; }
.tpl-vtab { padding: 6px 16px; border: 1px solid #ddd; background: #f5f5f5; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.tpl-vtab:first-child { border-radius: 6px 0 0 6px; }
.tpl-vtab:last-child { border-radius: 0 6px 6px 0; border-left: none; }
.tpl-vtab.active { background: #F8901E; color: #fff; border-color: #F8901E; }
.tpl-vtab:hover:not(.active) { background: #eee; }

/* A/B Report tab */
.ab-report { background: #fff; border-radius: 10px; padding: 20px; border: 1px solid #e5e5e5; }
.ab-report h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.ab-report h4 { margin-top: 16px; font-size: 14px; font-weight: 700; color: #333; }
.ab-report table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 6px; }
.ab-report th { text-align: left; padding: 8px 12px; border-bottom: 2px solid #eee; color: #666; font-weight: 600; font-size: 12px; text-transform: uppercase; }

.rate-bar { display: inline-block; height: 16px; border-radius: 4px; vertical-align: middle; }

@media (max-width: 700px) {
  .content { padding: 16px; }
  .form-row { flex-direction: column; }

/* Daily progress */
.daily-progress { background: #fff; border-radius: 10px; padding: 14px 20px; border: 1px solid #e5e5e5; margin-bottom: 20px; }
.daily-progress h3 { font-size: 13px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.daily-progress .lbl { color: #999; font-weight: 400; font-size: 11px; }
.progress-row { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }

</style>

<body>
<div class="header">
  <h1><span>DA</span> Prospecting Tool #6, Referral Partner 2nd Connections</h1>
  <div class="header-right"><button class="btn-templates" onclick="openTemplateEditor()">Edit Templates</button> <span id="prospect-count" style="margin-left:8px;"></span></div>
</div>
<div class="tabs" id="tabs"></div>
<div class="content" id="content"></div>
<div class="modal-overlay" id="template-modal" onclick="if(event.target===this)closeTemplateEditor()">
  <div class="modal" id="template-modal-content"></div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
const TITLE_KEYWORDS = ['founder','ceo','co-founder','owner','president','managing director','agency','consultant','advisor','strategist','partner','head of partnerships','vp partnerships','business development','director of marketing','vp marketing','cmo','creative director','head of content','content strategist'];

let state = {
  prospects: [],
  importedContacts: [],
  activeTab: 'dashboard',
  searchQuery: '',
  dashboardSearch: ''
};

// ============================================================
// API HELPERS
// ============================================================
async function apiGet(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`GET ${url} failed: ${res.status}`);
  return res.json();
}

async function apiPost(url, body) {
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(`POST ${url} failed: ${res.status}`);
  return res.json();
}

async function apiPut(url, body) {
  const res = await fetch(url, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(`PUT ${url} failed: ${res.status}`);
  return res.json();
}

async function apiDelete(url) {
  const res = await fetch(url, { method: 'DELETE' });
  if (!res.ok) throw new Error(`DELETE ${url} failed: ${res.status}`);
  return res.json();
}

async function loadFromServer() {
  try {
    const data = await apiGet('/api/prospects');
    state.prospects = data.prospects || [];

    // One-time migration: if server is empty but localStorage has data
    if (state.prospects.length === 0) {
      try {
        const local = JSON.parse(localStorage.getItem('da-referral-2nd-outreach')) || [];
        if (local.length > 0 && confirm(`Found ${local.length} prospects in browser storage. Migrate to server?`)) {
          await apiPost('/api/prospects/migrate', { prospects: local });
          const refreshed = await apiGet('/api/prospects');
          state.prospects = refreshed.prospects || [];
          localStorage.removeItem('da-referral-2nd-outreach');
          alert('Migration complete! Your data is now saved on the server.');
        }
      } catch (e) { /* localStorage empty or parse error */ }
    }
  } catch (err) {
    console.error('Failed to load from server:', err);
    // Fallback to localStorage if server is down
    try { state.prospects = JSON.parse(localStorage.getItem('da-referral-2nd-outreach')) || []; }
    catch { state.prospects = []; }
  }
  await loadTemplatesFromServer();
  render();
}

// ============================================================
// DATE HELPERS
// ============================================================
function today() {
  const d = new Date();
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}

function addDays(dateStr, days) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + days);
  return d.toISOString().split('T')[0];
}

function daysBetween(dateStr1, dateStr2) {
  const d1 = new Date(dateStr1);
  const d2 = new Date(dateStr2);
  return Math.floor((d2 - d1) / (1000 * 60 * 60 * 24));
}

function formatDate(dateStr) {
  if (!dateStr) return '\u2014';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function todayStr() {
  return today().toISOString().split('T')[0];
}

// ============================================================
// MESSAGE TEMPLATES (editable via localStorage)
// ============================================================
const TOOL_KEY = 'da_templates_tool6';
const AB_COUNTER_KEY = 'da_ab_counter_tool6';
const TEMPLATE_STEPS = ['connection_note', 'dm', 'follow_up_1', 'follow_up_2'];
const DEFAULT_TEMPLATES = {
  'connection_note_a': `Hi {name}, I run a video agency for B2B companies. Looks like we serve a similar audience, always looking to connect with potential referral partners. - Dane`,
  'dm_a': `Hey {name}, thanks for connecting! I run Digital Accomplice, video production for B2B companies. I noticed we serve a similar audience and wanted to see if there's an opportunity to send referrals back and forth.\n\nWe do video strategy, production, and LinkedIn content. When your clients need video, we're a natural fit. And if we meet companies that need what you do, happy to send them your way.\n\nWorth a quick chat?\n\nDane`,
  'follow_up_1_a': `Hey {name}, just bumping this. Think there's real overlap here. 15 min to see if it makes sense?`,
  'connection_note_b': `{name} \u2014 saw your work and think we could be a great mutual referral fit. I do video for B2B companies \u2014 would love to connect. \u2014 Dane`,
  'dm_b': `Hey {name}, glad we connected! I noticed we both work with B2B companies and thought there might be a natural referral opportunity here.\n\nI run Digital Accomplice \u2014 we help B2B teams with video strategy, production, and distribution. When our clients need services like yours, I'd love to have someone solid to point them to.\n\nOpen to a quick 15-min call to see if it's a fit?\n\nDane`,
  'follow_up_1_b': `{name} \u2014 circling back on this. I keep running into companies that could use what you do. Would be great to set up a quick referral chat \u2014 worth 15 min?`,
  'follow_up_2_b': `{name} \u2014 final nudge. No worries if the timing's off. Just know that if your clients ever need video, we'd take great care of them. Feel free to reach out anytime.\n\nDane`,
  'follow_up_2_a': `{name}, last one from me on this. If referrals aren't your thing right now, totally get it. But if you ever need a video partner for your clients, door's always open.\n\nDane`
};

const TEMPLATE_LABELS = {
  'connection_note': 'Connection Note',
  'dm': 'Initial DM',
  'follow_up_1': 'Follow-Up #1',
  'follow_up_2': 'Follow-Up #2'
};

let _cachedTemplates = null;

async function loadTemplatesFromServer() {
  try {
    const data = await apiGet('/api/templates');
    if (data.templates) {
      _cachedTemplates = { ...DEFAULT_TEMPLATES, ...data.templates };
    } else {
      let migrated = null;
      try {
        const local = localStorage.getItem(TOOL_KEY);
        if (local) {
          const parsed = JSON.parse(local);
          let needsMigration = false;
          for (const step of TEMPLATE_STEPS) {
            if (parsed[step] && !parsed[step + '_a']) {
              parsed[step + '_a'] = parsed[step];
              parsed[step + '_b'] = DEFAULT_TEMPLATES[step + '_b'];
              delete parsed[step];
              needsMigration = true;
            }
          }
          migrated = parsed;
        }
      } catch {}
      _cachedTemplates = { ...DEFAULT_TEMPLATES, ...(migrated || {}) };
      await apiPut('/api/templates', { templates: _cachedTemplates });
      localStorage.removeItem(TOOL_KEY);
    }
  } catch (err) {
    console.error('Failed to load templates from server:', err);
    try {
      const local = localStorage.getItem(TOOL_KEY);
      if (local) _cachedTemplates = { ...DEFAULT_TEMPLATES, ...JSON.parse(local) };
    } catch {}
    if (!_cachedTemplates) _cachedTemplates = { ...DEFAULT_TEMPLATES };
  }
  return _cachedTemplates;
}

function loadTemplates() {
  return _cachedTemplates || { ...DEFAULT_TEMPLATES };
}

async function saveTemplatesToServer(templates) {
  _cachedTemplates = templates;
  try {
    await apiPut('/api/templates', { templates });
  } catch (err) {
    console.error('Failed to save templates to server:', err);
    localStorage.setItem(TOOL_KEY, JSON.stringify(templates));
  }
}

function openTemplateEditor() {
  const templates = loadTemplates();
  const modal = document.getElementById('template-modal-content');
  let html = `<h2>Edit Message Templates</h2><p class="hint">Use {name} for first name, {company} for company name. Each step has A and B variants for testing.</p>`;
  for (const step of TEMPLATE_STEPS) {

      <div class="tpl-step-header">${label}</div>
      <div class="tpl-variant-tabs">
        <button class="tpl-vtab active" id="vtab-${step}-a" onclick="switchVariantTab('${step}','a')">Variant A</button>
        <button class="tpl-vtab" id="vtab-${step}-b" onclick="switchVariantTab('${step}','b')">Variant B</button>
      </div>
      <textarea id="tpl-${step}_a" style="display:block;">${esc(templates[step + '_a'] || DEFAULT_TEMPLATES[step + '_a'])}</textarea>
      <textarea id="tpl-${step}_b" style="display:none;">${esc(templates[step + '_b'] || DEFAULT_TEMPLATES[step + '_b'])}</textarea>

  }

function switchVariantTab(step, variant) {
  const aTab = document.getElementById('vtab-' + step + '-a');
  const bTab = document.getElementById('vtab-' + step + '-b');
  const aArea = document.getElementById('tpl-' + step + '_a');
  const bArea = document.getElementById('tpl-' + step + '_b');
  if (variant === 'a') {
    aTab.classList.add('active'); bTab.classList.remove('active');
    aArea.style.display = 'block'; bArea.style.display = 'none';
  } else {
    bTab.classList.add('active'); aTab.classList.remove('active');
    bArea.style.display = 'block'; aArea.style.display = 'none';
  }
}

function firstName(fullName) {
  return (fullName || '').split(' ')[0];
}

function getMessage(prospect, step, variant) {
  const templates = loadTemplates();
  const v = variant || (prospect.abVariants && prospect.abVariants[step] ? prospect.abVariants[step].toLowerCase() : 'a');
  const key = step + '_' + v;
  const template = templates[key] || DEFAULT_TEMPLATES[key] || '';
  return template
    .replace(/\{name\}/g, firstName(prospect.name))
    .replace(/\{company\}/g, prospect.company || 'your company');
}

async function copyMessage(prospectId, step) {
  const p = state.prospects.find(x => x.id === prospectId);
  if (!p) return;

  let variant;
  if (p.abVariants && p.abVariants[step]) {
    variant = p.abVariants[step];
  } else {
    let counter = parseInt(localStorage.getItem(AB_COUNTER_KEY) || '0');
    variant = (counter % 2 === 0) ? 'A' : 'B';
    localStorage.setItem(AB_COUNTER_KEY, String(counter + 1));
    const abVariants = { ...(p.abVariants || {}), [step]: variant };
    try {
      await apiPut('/api/prospects/' + prospectId, { abVariants });
      p.abVariants = abVariants;
    } catch (err) { console.error('Failed to save variant assignment:', err); }
  }

  const msg = getMessage(p, step, variant.toLowerCase());
  try {
    await navigator.clipboard.writeText(msg);
    const btn = document.getElementById('copy-btn-' + prospectId);
    if (btn) {
      btn.textContent = 'Copied! (' + variant + ')';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = step === 'connection_note' ? 'Copy Connection Note' : 'Copy Message'; btn.classList.remove('copied'); }, 2000);
    }
    const badge = document.getElementById('ab-badge-' + prospectId + '-' + step);
    if (badge) {
      badge.textContent = variant;
      badge.className = 'ab-badge ab-' + variant.toLowerCase();
      badge.style.display = '';
    }
  } catch (err) { alert('Copy failed \u2014 check browser permissions'); }
}

function togglePreview(prospectId, step) {
  const el = document.getElementById('msg-preview-' + prospectId);
  if (!el) return;
  if (el.classList.contains('show')) {
    el.classList.remove('show');

    const p = state.prospects.find(x => x.id === prospectId);
    if (p) el.textContent = getMessage(p, step);

function abBadge(p, step) {
  if (!p.abVariants || !p.abVariants[step]) return `<span class="ab-badge" id="ab-badge-${p.id}-${step}" style="display:none;"></span>`;
  const v = p.abVariants[step];
  return `<span class="ab-badge ab-${v.toLowerCase()}" id="ab-badge-${p.id}-${step}">${v}</span>`;
}

function normalizeLinkedInSlug(url) {
  if (!url) return '';
  const match = url.match(/linkedin\.com\/in\/([^/?#]+)/i);
  return match ? match[1].toLowerCase() : '';
}

function handleDashboardSearch(value) {
  state.dashboardSearch = value;
  const container = document.getElementById('dashboard-content');
  if (container) container.innerHTML = renderDashboardInner();
}

function renderDashboardSearchResults() {
  const q = state.dashboardSearch.trim();
  const qLower = q.toLowerCase();
  const qSlug = normalizeLinkedInSlug(q);

  let matches = state.prospects.filter(p => {
    if (qSlug && normalizeLinkedInSlug(p.linkedinUrl) === qSlug) return true;
    if ((p.name || '').toLowerCase().includes(qLower)) return true;
    if ((p.company || '').toLowerCase().includes(qLower)) return true;
    if ((p.linkedinUrl || '').toLowerCase().includes(qLower)) return true;
    return false;
  });

  if (matches.length === 0) {
    return `<div class="empty"><div class="icon">&#x1F50D;</div>No prospects match that search.<br>Try a different name or LinkedIn URL.</div>`;
  }

  let html = `<div class="search-count">${matches.length} match${matches.length !== 1 ? 'es' : ''}</div>`;
  matches.forEach(p => { html += renderProspectCard(p); });
  return html;
}

// CSV IMPORT
// ============================================================
function handleCSV(file) {
  Papa.parse(file, {
    header: false,
    skipEmptyLines: true,
    complete: function(results) {
      const raw = results.data;
      if (!raw.length) { alert('CSV appears empty \u2014 no rows found.'); return; }

      // Detect format: check if first row looks like LinkedIn headers
      const first = raw[0].map(c => (c || '').toLowerCase().trim());
      const isLinkedIn = first.includes('first name') || first.includes('last name') || first.includes('position');

      let rows;
      if (isLinkedIn) {
        // LinkedIn CSV with headers, use first row as keys, remaining rows as data
        const headers = raw[0].map(c => (c || '').trim());
        const dataRows = raw.slice(1);
        rows = dataRows.map(cols => {
          const obj = {};
          headers.forEach((h, i) => { obj[h] = (cols[i] || '').trim(); });
          const firstName = obj['First Name'] || obj['first_name'] || '';
          const lastName = obj['Last Name'] || obj['last_name'] || '';
          const company = obj['Company'] || obj['company'] || obj['Organization'] || '';
          const position = obj['Position'] || obj['position'] || obj['Title'] || obj['title'] || '';
          const url = obj['URL'] || obj['url'] || obj['LinkedIn URL'] || obj['Profile URL'] || '';
          return { firstName, lastName, company, position, url, selected: false };
        });
      } else {
        // No-header CSV
        rows = raw.map(cols => {
          const name = (cols[0] || '').trim();
          const companyOrHeadline = (cols[1] || '').trim();
          const title = (cols[2] || '').trim();
          let url = '';
          for (let i = 0; i < cols.length; i++) {
            if ((cols[i] || '').includes('linkedin.com/in/')) { url = cols[i].trim(); break; }
          }
          let company = companyOrHeadline;
          if (companyOrHeadline.includes('|')) { company = ''; }
          return { firstName: name, lastName: '', company, position: title, url, selected: false };
        });
      }

      if (!rows.length) { alert('No contacts found in file.'); return; }
      finishImport(rows);
    },
    error: function(err) {
      alert('CSV parse error: ' + err.message);
    }
  });
}

function finishImport(rows) {
  // Filter by title keywords
  const filtered = rows.filter(r => {
    const pos = r.position.toLowerCase();
    return TITLE_KEYWORDS.some(kw => pos.includes(kw));
  });

  // If keyword filter removes everything, show all rows (user's CSV may already be pre-filtered)
  state.importedContacts = filtered.length > 0 ? filtered : rows;
  render();
}

async function activateSelected() {
  const selected = state.importedContacts.filter(c => c.selected);
  if (!selected.length) return;

  const prospects = selected.map(c => ({
    name: (c.firstName + ' ' + c.lastName).trim(),
    company: c.company,
    title: c.position,
    linkedinUrl: c.url
  }));

  try {
    const result = await apiPost('/api/prospects', { prospects });
    const data = await apiGet('/api/prospects');
    state.prospects = data.prospects || [];
    state.importedContacts = [];
    alert(result.added + ' prospect(s) added.' + (result.skipped ? ' ' + result.skipped + ' skipped (duplicates).' : ''));
    state.activeTab = 'dashboard';
    render();
  } catch (err) { alert('Failed to add prospects: ' + err.message); }
}

const DAILY_TARGETS = { newDMs: 2, connRequests: 10 };

function getDailyProgress() {
  const t = todayStr();
  const newDMs = state.prospects.filter(p => p.dmSentDate === t).length;
  const connReqs = state.prospects.filter(p => p.connectionSentDate === t).length;
  const followUps = state.prospects.filter(p => p.lastActionDate === t && (p.status === 'follow_up_1' || p.status === 'follow_up_2')).length;
  return { newDMs, connReqs, followUps };
}

function renderDailyProgress() {
  const { newDMs, connReqs, followUps } = getDailyProgress();
  const dmPct = Math.min(100, Math.round((newDMs / DAILY_TARGETS.newDMs) * 100));
  const connPct = Math.min(100, Math.round((connReqs / DAILY_TARGETS.connRequests) * 100));
  const dmDone = newDMs >= DAILY_TARGETS.newDMs;
  const connDone = connReqs >= DAILY_TARGETS.connRequests;
  return `<div class="daily-progress">
    <h3>Daily Target <span class="lbl">LinkedIn 2nd Connections</span></h3>
    <div class="progress-row">
      <span class="progress-label">Conn Requests</span>
      <div class="progress-track"><div class="progress-fill ${connDone ? 'green' : 'orange'}" style="width:${connPct}%"></div></div>
      <span class="progress-nums ${connDone ? 'done' : ''}">${connReqs} / ${DAILY_TARGETS.connRequests}</span>
    </div>
    <div class="progress-row">
      <span class="progress-label">New DMs</span>
      <div class="progress-track"><div class="progress-fill ${dmDone ? 'green' : 'orange'}" style="width:${dmPct}%"></div></div>
      <span class="progress-nums ${dmDone ? 'done' : ''}">${newDMs} / ${DAILY_TARGETS.newDMs}</span>
    </div>
    ${followUps > 0 ? `<div class="progress-row"><span class="progress-label">Follow-ups done</span><div class="progress-track"><div class="progress-fill green" style="width:100%"></div></div><span class="progress-nums done">${followUps}</span></div>` : ''}
  </div>`;
}

  const dmList = getDmToday();

  const reList = getReplied();
  const waitList = getWaiting();

  let html = '';

  // Summary banner
  if (state.prospects.length > 0) {
    html += `<div class="alert-banner">
      <strong>Today's Outreach</strong>
      <span class="alert-stat">${connReqList.length} connection request${connReqList.length !== 1 ? 's' : ''} to send</span>
      <span class="alert-stat">${connCheckList.length} connection${connCheckList.length !== 1 ? 's' : ''} to check</span>
      <span class="alert-stat">${dmList.length} DM${dmList.length !== 1 ? 's' : ''} to send</span>
      <span class="alert-stat">${fuList.length} follow-up${fuList.length !== 1 ? 's' : ''} due</span>
      <span class="alert-stat">${reList.length} repl${reList.length !== 1 ? 'ies' : 'y'}</span>
      <span class="alert-stat">${waitList.length} waiting</span>
    </div>`;
  }

  html += renderDailyProgress();

  // 1. Send Connection Requests
  html += `<div class="section">
    <div class="section-header">Send Connection Requests <span class="count">${connReqList.length}</span></div>`;
  if (connReqList.length === 0) {
    html += `<div class="empty"><div class="icon">&#x2713;</div>No connection requests to send</div>`;
  } else {
    connReqList.forEach(p => {
      html += renderDashboardCard(p, 'connection_request');
    });
  }
  html += `</div>`;

  // 2. Check Connection Status
  html += `<div class="section">
    <div class="section-header">Check Connection Status <span class="count">${connCheckList.length}</span></div>`;
  if (connCheckList.length === 0) {
    html += `<div class="empty"><div class="icon">&#x2713;</div>No connections to check right now</div>`;
  } else {
    connCheckList.forEach(p => {
      html += renderDashboardCard(p, 'connection_check');
    });
  }
  html += `</div>`;

  // 3. DM Today
  html += `<div class="section">
    <div class="section-header">DM Today <span class="count">${dmList.length}</span></div>`;
  if (dmList.length === 0) {
    html += `<div class="empty"><div class="icon">&#x2713;</div>No DMs to send today</div>`;
  } else {
    dmList.forEach(p => {
      html += renderDashboardCard(p, 'dm');
    });
  }
  html += `</div>`;

  // 4. Follow Up Today
  html += `<div class="section">
    <div class="section-header">Follow Up Today <span class="count">${fuList.length}</span></div>`;
  if (fuList.length === 0) {
    html += `<div class="empty"><div class="icon">&#x2713;</div>No follow-ups due today</div>`;
  } else {
    fuList.forEach(p => {
      html += renderDashboardCard(p, 'followup');
    });
  }
  html += `</div>`;

  // 5. Replied
  html += `<div class="section">
    <div class="section-header">Replied <span class="count">${reList.length}</span></div>`;
  if (reList.length === 0) {
    html += `<div class="empty"><div class="icon">&#x1F4AC;</div>No replies yet \u2014 keep going</div>`;
  } else {
    reList.forEach(p => {
      html += renderDashboardCard(p, 'replied');
    });
  }
  html += `</div>`;

  // 6. Waiting
  if (waitList.length > 0) {
    html += `<div class="section">
      <div class="section-header">Waiting for Response</div>`;
    waitList.forEach(p => {
      const t = todayStr();
      let dueLabel = '';
      if (p.status === 'connection_sent') dueLabel = 'Check connection ' + formatDate(p.connectionCheckDate);
      else if (p.status === 'dm_sent') dueLabel = 'Follow-up due ' + formatDate(p.followUp1Due);
      else if (p.status === 'follow_up_1') dueLabel = 'Final nudge due ' + formatDate(p.followUp2Due);
      else if (p.status === 'follow_up_2') {
        const daysLeft = 3 - daysBetween(p.lastActionDate, todayStr());
        dueLabel = 'Final nudge sent, check back in ' + daysLeft + ' day' + (daysLeft !== 1 ? 's' : '');
      }
      html += `<div class="card">
        <button class="card-delete" onclick="removeProspect('${p.id}')" title="Remove prospect">&times;</button>
        <div class="card-top">
          <div>
            <span class="card-name">${esc(p.name)}</span> <span class="card-company">@ ${esc(p.company)}</span>
            <div style="margin-top:2px;"><a href="${p.linkedinUrl ? esc(p.linkedinUrl) : 'https://www.linkedin.com/search/results/people/?keywords=' + encodeURIComponent(p.name + ' ' + p.company)}" target="_blank" style="background:#0077B5;color:#fff;text-decoration:none;font-size:11px;padding:3px 8px;border-radius:4px;font-weight:600;display:inline-block;">Open LinkedIn &#x2197;</a>${getActivityFeedUrl(p.linkedinUrl) ? ` <a href="${getActivityFeedUrl(p.linkedinUrl)}" target="_blank" style="color:#F8901E;text-decoration:none;font-size:11px;padding:3px 8px;font-weight:600;display:inline-block;">Activity Feed &#x2197;</a>` : ''}</div>
          </div>
          <span class="status status-${p.status}">${STATUS_LABELS[p.status]}</span>
        </div>
        <div class="due-info">${dueLabel}</div>
      </div>`;
    });
    html += `</div>`;
  }

  return html;
}

function renderDashboardCard(p, mode) {
  let buttons = '';
  let extra = '';
  const t = todayStr();

  if (mode === 'connection_request') {
    buttons = `
      <button class="btn btn-copy btn-sm" id="copy-btn-${p.id}" onclick="copyMessage('${p.id}','connection_note')">Copy Connection Note</button>${abBadge(p, 'connection_note')}
      <button class="btn btn-secondary btn-sm" onclick="togglePreview('${p.id}','connection_note')">Preview</button>
      <button class="btn btn-primary btn-sm" onclick="markConnectionSent('${p.id}')">Mark Request Sent</button>
    `;
    extra = `<div class="msg-preview" id="msg-preview-${p.id}"></div>`;
  } else if (mode === 'connection_check') {
    const daysSinceSent = p.connectionSentDate ? daysBetween(p.connectionSentDate, t) : 0;
    const warningText = daysSinceSent >= 14 ? `<div class="connection-warning">Request sent ${daysSinceSent} days ago \u2014 consider giving up</div>` : '';
    extra = `<div class="due-info">Connection request sent ${daysSinceSent} day${daysSinceSent !== 1 ? 's' : ''} ago</div>${warningText}`;
    buttons = `
      <button class="btn btn-success btn-sm" onclick="markConnectionAccepted('${p.id}')">Mark Accepted</button>
      <button class="btn btn-warning btn-sm" onclick="snoozeConnectionCheck('${p.id}')">Snooze 7 Days</button>
      <button class="btn btn-danger btn-sm" onclick="markCold('${p.id}')">Give Up</button>
    `;
  } else if (mode === 'dm') {
    buttons = `
      <button class="btn btn-copy btn-sm" id="copy-btn-${p.id}" onclick="copyMessage('${p.id}','dm')">Copy Message</button>${abBadge(p, 'dm')}
      <button class="btn btn-secondary btn-sm" onclick="togglePreview('${p.id}','dm')">Preview</button>
      <button class="btn btn-primary btn-sm" onclick="markDmSent('${p.id}')">Mark DM Sent</button>
    `;
    extra = `<div class="msg-preview" id="msg-preview-${p.id}"></div>`;
  } else if (mode === 'followup') {
    if (p.status === 'dm_sent') {
      const daysOver = daysBetween(p.followUp1Due, t);
      const overdueLabel = daysOver > 0 ? `<span class="overdue">${daysOver} day${daysOver > 1 ? 's' : ''} overdue</span>` : '';
      extra = `<div class="due-info">First follow-up ${overdueLabel}</div><div class="msg-preview" id="msg-preview-${p.id}"></div>`;
      buttons = `
        <button class="btn btn-copy btn-sm" id="copy-btn-${p.id}" onclick="copyMessage('${p.id}','follow_up_1')">Copy Message</button>${abBadge(p, 'follow_up_1')}
        <button class="btn btn-secondary btn-sm" onclick="togglePreview('${p.id}','follow_up_1')">Preview</button>
        <button class="btn btn-primary btn-sm" onclick="markFollowUp1('${p.id}')">Mark Follow-Up Sent</button>
        <button class="btn btn-success btn-sm" onclick="markReplied('${p.id}')">Got Reply</button>
        `;
    } else if (p.status === 'follow_up_1') {
      const daysOver = daysBetween(p.followUp2Due, t);
      const overdueLabel = daysOver > 0 ? `<span class="overdue">${daysOver} day${daysOver > 1 ? 's' : ''} overdue</span>` : '';
      extra = `<div class="due-info">Final nudge ${overdueLabel}</div><div class="msg-preview" id="msg-preview-${p.id}"></div>`;
      buttons = `
        <button class="btn btn-copy btn-sm" id="copy-btn-${p.id}" onclick="copyMessage('${p.id}','follow_up_2')">Copy Message</button>${abBadge(p, 'follow_up_2')}
        <button class="btn btn-secondary btn-sm" onclick="togglePreview('${p.id}','follow_up_2')">Preview</button>
        <button class="btn btn-primary btn-sm" onclick="markFollowUp2('${p.id}')">Mark Final Nudge Sent</button>
        <button class="btn btn-success btn-sm" onclick="markReplied('${p.id}')">Got Reply</button>
        `;
    } else if (p.status === 'follow_up_2') {
      extra = `<div class="due-info">No reply after final nudge \u2014 time to close?</div>`;
      buttons = `
        <button class="btn btn-danger btn-sm" onclick="markCold('${p.id}')">Mark Cold</button>
        <button class="btn btn-success btn-sm" onclick="markReplied('${p.id}')">Got Reply</button>
      `;
    }
  } else if (mode === 'replied') {
    const draft = getDraftReply(p);
    extra = `
      <div class="reply-area">
        <label>Their reply:</label>
        <textarea placeholder="Paste what they said..." onblur="updateReply('${p.id}', this.value)">${esc(p.reply || '')}</textarea>
      </div>
      <div class="draft-reply-area">
        <div class="draft-reply-header">
          <label>Your draft reply:</label>
          <button class="btn-copy-draft" id="copy-draft-btn-${p.id}" onclick="copyDraftReply('${p.id}')">Copy Draft</button>
        </div>
        <textarea id="draft-reply-${p.id}" placeholder="Your reply to send back..." onblur="updateDraftReply('${p.id}', this.value)">${esc(draft)}</textarea>
      </div>
      <div class="next-step-field">
        <label style="font-size:12px;font-weight:600;color:#666;display:block;margin-bottom:4px;">Next step:</label>
        <input placeholder="e.g. Schedule call for Tuesday" value="${esc(p.nextStep || '')}" onblur="updateNextStep('${p.id}', this.value)" />
      </div>
    `;
  }

  const linkedinSearchUrl = 'https://www.linkedin.com/search/results/people/?keywords=' + encodeURIComponent(p.name + ' ' + p.company);
  const linkedinField = `<div class="linkedin-field" style="margin-top:6px;display:flex;align-items:center;gap:6px;">
    <input type="text" placeholder="Paste LinkedIn URL..." value="${esc(p.linkedinUrl || '')}"
      onblur="updateLinkedinUrl('${p.id}', this.value)"
      style="flex:1;padding:5px 8px;border:1px solid #ddd;border-radius:5px;font-size:12px;font-family:'Inter',sans-serif;color:#333;" />
    <a href="${p.linkedinUrl ? esc(p.linkedinUrl) : linkedinSearchUrl}" target="_blank" class="btn btn-sm" style="background:#0077B5;color:#fff;white-space:nowrap;text-decoration:none;font-size:12px;padding:5px 10px;border-radius:5px;font-weight:600;">Open LinkedIn &#x2197;</a>
  </div>`;

  return `<div class="card">
    <div class="card-top">
      <div>
        <span class="card-name">${esc(p.name)}</span> <span class="card-company">@ ${esc(p.company)}</span>
        <div class="card-title">${esc(p.title)}</div>
        ${linkedinField}
      </div>
      <span class="status status-${p.status}">${STATUS_LABELS[p.status]}</span>
    </div>
    <button class="card-delete" onclick="removeProspect('${p.id}')" title="Remove prospect">&times;</button>
    ${extra}
    ${renderTimeline(p)}
    <div class="btn-group">${buttons}<button class="btn btn-danger btn-sm" onclick="removeProspect('${p.id}')">Remove</button></div>
  </div>`;
}

function renderTimeline(p) {
  const steps = [
    { label: 'Request', key: 'connection_sent' },
    { label: 'Accept', key: 'connection_accepted' },
    { label: 'DM', key: 'dm_sent' },
    { label: 'Follow-Up', key: 'follow_up_1' },
    { label: 'Final Nudge', key: 'follow_up_2' }
  ];
  const statusOrder = ['not_started', 'connection_sent', 'connection_accepted', 'dm_sent', 'follow_up_1', 'follow_up_2'];
  const currentIdx = statusOrder.indexOf(p.status);

  if (p.status === 'not_started' || p.status === 'replied' || p.status === 'cold') return '';

  return `<div class="timeline">${steps.map((s, i) => {
    const stepIdx = i + 1;
    let cls = 'upcoming';
    if (stepIdx < currentIdx) cls = 'done';
    else if (stepIdx === currentIdx) cls = 'current';
    return `<div class="timeline-step ${cls}">${s.label}</div>`;
  }).join('')}</div>`;
}

  render();
}

function renderProspectsList() {
  const q = (state.searchQuery || '').toLowerCase().trim();
  const order = ['not_started', 'dm_sent', 'follow_up_1', 'follow_up_2', 'replied', 'cold'];
  let filtered = [...state.prospects].sort((a, b) => order.indexOf(a.status) - order.indexOf(b.status));

  if (q) {
    const qSlug = normalizeLinkedInSlug(q);
    filtered = filtered.filter(p => {
      if (qSlug && normalizeLinkedInSlug(p.linkedinUrl) === qSlug) return true;
      return (p.name || '').toLowerCase().includes(q) ||
        (p.company || '').toLowerCase().includes(q) ||
        (p.title || '').toLowerCase().includes(q) ||
        (p.linkedinUrl || '').toLowerCase().includes(q);
    });
  }

  if (filtered.length === 0) {
    return `<div class="search-count">No matches for "${esc(state.searchQuery)}"</div>`;
  }

  let html = q ? `<div class="search-count">${filtered.length} of ${state.prospects.length} prospects</div>` : '';
  filtered.forEach(p => {
    html += renderProspectCard(p);
  });
  return html;
}

function renderProspects() {
  if (state.prospects.length === 0) {
    return `<div class="empty"><div class="icon">&#x1F465;</div>No prospects yet. Import a CSV or add manually.</div>`;
  }

  let html = `<input type="text" class="search-bar" placeholder="Search by name, company, or title..." value="${esc(state.searchQuery)}" oninput="handleSearch(this.value)">`;
  html += `<div id="prospects-list">`;
  html += renderProspectsList();
  html += `</div>`;
  return html;
}

async function loadActivityLog() {
  try {

    const el = document.getElementById('content');
    if (state.activeTab !== 'activity') return;

    if (!data.activity || data.activity.length === 0) {
      el.innerHTML = '<div class="empty"><div class="icon">&#x1F4CB;</div>No activity recorded yet. Actions will appear here as you use the tool.</div>';
      return;
    }

    let html = '<div class="section"><div class="section-header">Activity Log <span class="count">' + data.activity.length + '</span></div>';
    let lastDate = '';
    data.activity.forEach(a => {
      const dateStr = a.date ? a.date.split('T')[0] : '';
      const timeStr = a.date ? new Date(a.date).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }) : '';
      if (dateStr !== lastDate) {
        lastDate = dateStr;
        html += `<div style="font-size:13px;font-weight:700;color:#333;margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid #eee;">${formatDate(dateStr)}</div>`;
      }
      html += `<div class="card" style="padding:10px 16px;">
        <span style="font-size:12px;color:#888;min-width:70px;display:inline-block;">${timeStr}</span>
        <span style="font-size:13px;margin-left:8px;"><strong>${esc(a.action)}</strong>${a.prospectName ? ' \u2014 ' + esc(a.prospectName) : ''}</span>
      </div>`;
    });
    html += '</div>';
    el.innerHTML = html;
  } catch (err) {
    document.getElementById('content').innerHTML = '<div class="empty">Failed to load activity log.</div>';
  }
}

function renderABReport() {
  const reportSteps = TEMPLATE_STEPS.filter(s => s !== 'connection_note');
  let html = '<div class="ab-report"><h3>A/B Template Performance</h3>';
  html += '<p style="font-size:12px;color:#888;margin-bottom:16px;">Tracks which message variant (A or B) each prospect received. Reply rates show which version is working better.</p>';

  for (const step of reportSteps) {
    const label = TEMPLATE_LABELS[step];
    const withA = state.prospects.filter(p => p.abVariants && p.abVariants[step] === 'A');
    const withB = state.prospects.filter(p => p.abVariants && p.abVariants[step] === 'B');

    const sentA = withA.length;
    const sentB = withB.length;
    const repliedA = withA.filter(p => p.status === 'replied').length;
    const repliedB = withB.filter(p => p.status === 'replied').length;
    const rateA = sentA > 0 ? Math.round((repliedA / sentA) * 100) : 0;
    const rateB = sentB > 0 ? Math.round((repliedB / sentB) * 100) : 0;
    const totalSent = sentA + sentB;

    const maxRate = Math.max(rateA, rateB, 1);
    const barWidthA = Math.round((rateA / maxRate) * 120);
    const barWidthB = Math.round((rateB / maxRate) * 120);

    html += `<h4>${label}</h4>
      <table>
        <tr><th>Variant</th><th>Sent</th><th>Replied</th><th>Reply Rate</th><th></th></tr>
        <tr>
          <td><span class="ab-badge ab-a">A</span></td>
          <td>${sentA}</td>
          <td>${repliedA}</td>
          <td class="${rateA > rateB && sentA >= 5 ? 'ab-winner' : ''}">${rateA}%</td>
          <td><span class="rate-bar rate-bar-a" style="width:${barWidthA}px;"></span></td>
        </tr>
        <tr>
          <td><span class="ab-badge ab-b">B</span></td>
          <td>${sentB}</td>
          <td>${repliedB}</td>
          <td class="${rateB > rateA && sentB >= 5 ? 'ab-winner' : ''}">${rateB}%</td>
          <td><span class="rate-bar rate-bar-b" style="width:${barWidthB}px;"></span></td>
        </tr>
      </table>
      ${totalSent < 10 ? '<div class="sample-warning">Need at least 10 sends per variant for meaningful comparison.</div>' : ''}`;
  }

  if (state.prospects.filter(p => p.abVariants).length === 0) {
    html += `<div class="empty" style="margin-top:16px;"><div class="icon">&#x1F4CA;</div>No A/B data yet. Copy a message to start assigning variants.</div>`;
  }

  html += `</div>`;
  return html;
}

// ============================================================
// HELPERS
// ============================================================
function esc(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// INIT
// ============================================================
loadFromServer();
</script>
