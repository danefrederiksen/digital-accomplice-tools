<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>DA Long-Form Thumbnail — Template</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --da-orange: #F8901E;
    --da-black: #000000;
    --da-white: #FFFFFF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #1a1a1a;
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .thumbnail {
    width: 1280px;
    height: 720px;
    background: var(--da-black);
    display: grid;
    grid-template-columns: 1fr 1fr;
    position: relative;
    overflow: hidden;
  }

  .left {
    background: var(--da-black);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 50px 100px 50px;
  }

  .headline {
    color: var(--da-orange);
    font-weight: 900;
    font-size: 110px;
    line-height: 0.95;
    letter-spacing: -0.02em;
    text-transform: uppercase;
    text-align: left;
    word-break: break-word;
  }

  .right {
    background: #222;
    background-image: var(--photo-url);
    background-size: cover;
    background-position: center top;
    background-repeat: no-repeat;
  }

  .wordmark {
    position: absolute;
    bottom: 28px;
    left: 50px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 5;
  }

  .wordmark-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--da-orange);
  }

  .wordmark-text {
    color: var(--da-white);
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="thumbnail" style="--photo-url: url('../../reports/todd-headshot-final.png');">
    <div class="left">
      <div class="headline">3-Person Team.<br />Zero Slop.</div>
    </div>
    <div class="right"></div>
    <div class="wordmark">
      <div class="wordmark-dot"></div>
      <div class="wordmark-text">Digital Accomplice</div>
    </div>
  </div>
</body>
</html>
